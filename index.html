<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriSite</title>
  <meta
    name="description"
    content="NutriSite landing page reproduced from the provided Figma design."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-frame">
    <header class="figma-header reveal" id="top">
      <img
        class="section-image"
        src="assets/header.png"
        alt="NutriSite header from Figma design"
      >

      <nav class="hotspot-nav" aria-label="Primary navigation">
        <a class="hotspot hotspot-home" href="#hero" aria-label="Home"></a>
        <a class="hotspot hotspot-menu" href="#meals" aria-label="Menu"></a>
        <a class="hotspot hotspot-about" href="#ingredients" aria-label="About"></a>
        <a class="hotspot hotspot-contact" href="#nutritionist" aria-label="Contact"></a>
        <a class="hotspot hotspot-review" href="#footer" aria-label="Review"></a>
      </nav>
    </header>

    <main>
      <section class="figma-section reveal" id="hero">
        <img
          class="section-image"
          src="assets/hero.png"
          alt="Hero section from Figma design"
          loading="eager"
        >
      </section>

      <section class="figma-section reveal" id="meals">
        <img
          class="section-image"
          src="assets/meals.png"
          alt="Fresh healthy delicious foods section from Figma design"
          loading="lazy"
        >
      </section>

      <section class="figma-section reveal" id="ingredients">
        <img
          class="section-image"
          src="assets/ingredients.png"
          alt="Ingredients and diet section from Figma design"
          loading="lazy"
        >
      </section>

      <section class="figma-section reveal" id="benefits">
        <img
          class="section-image"
          src="assets/benefits.png"
          alt="Benefits section from Figma design"
          loading="lazy"
        >
      </section>

      <section class="figma-section reveal" id="nutritionist">
        <img
          class="section-image"
          src="assets/nutritionist.png"
          alt="Personal nutritionist section from Figma design"
          loading="lazy"
        >
      </section>
    </main>

    <footer class="figma-footer reveal" id="footer">
      <img
        class="section-image"
        src="assets/footer.png"
        alt="Footer section from Figma design"
        loading="lazy"
      >
    </footer>
  </div>

  <button class="back-to-top" type="button" aria-label="Back to top">↑</button>

  <script src="script.js"></script>
</body>
</html>
